<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCut Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#0f1115;
color:white;
padding:18px;
padding-bottom:120px;
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
opacity:.6;
margin-bottom:24px;
font-size:15px;
}

.card{
background:#1a1d24;
padding:18px;
border-radius:24px;
margin-bottom:18px;
box-shadow:0 0 20px rgba(0,0,0,.25);
}

textarea{
width:100%;
height:220px;
background:#2b3039;
border:none;
border-radius:18px;
padding:16px;
font-size:17px;
color:white;
resize:none;
outline:none;
line-height:1.5;
}

button{
border:none;
border-radius:18px;
padding:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.98);
}

.primary{
background:#4f7cff;
color:white;
width:100%;
margin-top:14px;
}

.secondary{
background:#2b3039;
color:white;
flex:1;
}

.danger{
background:#ff4d67;
color:white;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#14181f;
padding:14px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.result{
background:#11151c;
border-radius:18px;
padding:18px;
margin-top:16px;
line-height:1.8;
white-space:pre-line;
font-size:17px;
}

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.stat{
background:#262b35;
padding:14px;
border-radius:16px;
text-align:center;
}

.stat b{
display:block;
font-size:28px;
margin-top:6px;
}

.green{
color:#6dff8b;
}

.orange{
color:#ffd36d;
}

.red{
color:#ff6d6d;
}

.small{
font-size:14px;
opacity:.5;
margin-top:10px;
line-height:1.5;
}

</style>
</head>

<body>

<h1>FrameCut Pro</h1>

<div class="subtitle">
Оптимизатор раскроя подрамников
</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Вставь заказ
</h3>

<textarea id="input"
placeholder="Пример:

40х50 - 1040
30х40 - 1000
50х70 - 400"></textarea>

<div class="small">
Формат:
ширина × высота - количество
</div>

<button class="primary" onclick="calculate()">
Рассчитать
</button>

</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Результат
</h3>

<div class="stat-grid">

<div class="stat">
Загрузок
<b id="loads">0</b>
</div>

<div class="stat">
Размеров
<b id="sizes">0</b>
</div>

</div>

<div id="result" class="result">
Нет расчёта
</div>

</div>

<div class="bottom">

<button class="secondary"
onclick="shareResult()">
Поделиться
</button>

<button class="danger"
onclick="clearAll()">
Очистить
</button>

</div>

<script>

const STOCK = 270;
const RAILS = 26;

function parseInput(text){

const lines = text.split("\n");

let items = [];

lines.forEach(line=>{

const match =
line.match(/(\d+)\s*[xх×]\s*(\d+)\s*[-–—]\s*(\d+)/i);

if(match){

items.push({
w:Number(match[1]),
h:Number(match[2]),
count:Number(match[3])
});

}

});

return items;

}

function calculate(){

const text =
document.getElementById("input").value;

const items = parseInput(text);

document.getElementById("sizes").innerText =
items.length;

let totalLoads = 0;

let resultText = "";

let leftovers = [];

items.forEach(item=>{

const sidesW = item.count * 2;
const sidesH = item.count * 2;

const best = optimize(
item.w,
item.h,
sidesW,
sidesH,
leftovers
);

totalLoads += best.loads;

resultText +=
`${item.w}×${item.h} — ${item.count} шт\n\n`;

resultText +=
`${best.loads} загрузок\n`;

resultText +=
`${best.scheme}\n`;

if(best.leftover >= 30){

leftovers.push(best.leftover);

resultText +=
`<span class="green">
Остаток ${best.leftover}см → использован дальше
</span>\n`;

}else if(best.leftover >=10){

resultText +=
`<span class="orange">
Остаток ${best.leftover}см
</span>\n`;

}else{

resultText +=
`<span class="green">
Отход ${best.leftover}см
</span>\n`;

}

resultText += `\n──────────────\n\n`;

});

document.getElementById("loads").innerText =
totalLoads;

document.getElementById("result").innerHTML =
resultText;

localStorage.setItem(
"framecut_input",
text
);

}

function optimize(w,h,sidesW,sidesH,leftovers){

let best = null;

for(let a=1;a<=10;a++){

for(let b=1;b<=10;b++){

const used =
(a*w)+(b*h);

if(used > STOCK) continue;

const remain =
STOCK-used;

const sidesPerLoad =
Math.min(a,b) * RAILS;

if(sidesPerLoad <=0) continue;

const loadsW =
Math.ceil(sidesW/(a*RAILS));

const loadsH =
Math.ceil(sidesH/(b*RAILS));

const loads =
Math.max(loadsW,loadsH);

let score = remain;

if(remain >=10 && remain <30){
score += 1000;
}

if(!best || score < best.score){

best = {
loads,
scheme:
`${a} × ${w}\n${b} × ${h}`,
leftover:remain,
score
};

}

}

}

return best;

}

function shareResult(){

const text =
document.getElementById("result").innerText;

navigator.share?.({
title:"FrameCut Pro",
text
}).catch(()=>{

navigator.clipboard.writeText(text);

alert("Результат скопирован");

});

}

function clearAll(){

document.getElementById("input").value = "";

document.getElementById("result").innerHTML =
"Нет расчёта";

document.getElementById("loads").innerText = "0";
document.getElementById("sizes").innerText = "0";

localStorage.removeItem("framecut_input");

}

window.onload = ()=>{

const saved =
localStorage.getItem("framecut_input");

if(saved){

document.getElementById("input").value =
saved;

}

}

</script>

</body>
</html>
