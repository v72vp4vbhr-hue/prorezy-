<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Расчёт прорезов</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233a3a3a'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%235a8'%3E✂%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Прорезы">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; overflow:hidden; background:#2c2c2c; font-family:'Segoe UI',Tahoma,sans-serif; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        .scroll-container { height:100%; width:100%; overflow-y:scroll; -webkit-overflow-scrolling:touch; padding:16px; display:flex; justify-content:center; align-items:flex-start; }
        .app { background:#3a3a3a; border-radius:12px; padding:20px; width:100%; max-width:650px; box-shadow:0 8px 32px rgba(0,0,0,0.4); margin-bottom:40px; }
        h1 { color:#e0e0e0; text-align:center; margin-bottom:14px; font-size:20px; }
        .info { background:#333; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:#aaa; }
        .info b { color:#ddd; }
        label { display:block; color:#b0b0b0; margin-bottom:6px; font-size:14px; }
        textarea { width:100%; height:140px; background:#4a4a4a; border:1px solid #555; border-radius:8px; color:#fff; font-size:14px; padding:12px; outline:none; resize:vertical; font-family:'SF Mono',monospace; line-height:1.6; }
        .hint { color:#888; font-size:11px; margin-top:4px; }
        .btn-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
        .btn { flex:1; min-width:80px; padding:12px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
        .btn-calculate { background:#5a8; color:#fff; }
        .btn-clear { background:#555; color:#ccc; }
        .results { margin-top:16px; display:none; }
        .results.show { display:block; }
        .size-card { background:#333; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
        .card-header { color:#fff; font-size:15px; font-weight:600; margin-bottom:4px; }
        .info-line { font-size:12px; color:#aaa; margin-bottom:4px; line-height:1.4; }
        .green { color:#5c5; }
        .blue { color:#8af; }
        .cuts-row { display:flex; justify-content:space-between; padding:2px 0; font-size:13px; color:#ccc; }
        .cuts-row .val { color:#5c5; font-weight:600; font-size:15px; }
        .summary { background:#444; border-radius:8px; padding:14px 16px; margin-top:12px; }
        .summary-row { display:flex; justify-content:space-between; padding:3px 0; color:#ddd; font-size:14px; }
        .summary-row .val { color:#fff; font-weight:700; font-size:16px; }
        .error { color:#e88; text-align:center; margin-top:12px; display:none; font-size:13px; }
        .error.show { display:block; }
        @supports(padding:env(safe-area-inset-top)) { .scroll-container { padding-top:calc(16px + env(safe-area-inset-top)); padding-bottom:calc(16px + env(safe-area-inset-bottom)); } }
    </style>
</head>
<body>
<div class="scroll-container">
<div class="app">
<h1>📐 Расчёт прорезов</h1>
<div class="info"><b>Рейка:</b> 270 см | <b>Загрузка:</b> 26 шт. | <b>Деталей на подрамник:</b> 4</div>
<label>Введите заказ:</label>
<textarea id="inputData" placeholder="40x50 — 100
30x40 — 200
50x70 — 80"></textarea>
<div class="hint">Формат: <b>Ширина x Высота — Количество подрамников</b></div>
<div class="btn-row">
<button class="btn btn-calculate" onclick="calc()">Рассчитать</button>
<button class="btn btn-clear" onclick="clearInput()">Очистить</button>
</div>
<div class="error" id="error"></div>
<div class="results" id="results"></div>
</div>
</div>
<script>
var LOAD = 26;
var REIKA = 270;

function parseInput(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var items = [];
    for (var i = 0; i < lines.length; i++) {
        var m = lines[i].match(/(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i);
        if (m) {
            var w = parseInt(m[1]), h = parseInt(m[2]), q = parseInt(m[3]);
            if (w > 0 && h > 0 && q > 0) items.push({w: w, h: h, q: q});
        }
    }
    return items;
}

function calc() {
    var input = document.getElementById('inputData').value.trim();
    var errEl = document.getElementById('error');
    var resEl = document.getElementById('results');
    errEl.classList.remove('show');
    resEl.classList.remove('show');
    if (!input) { errEl.textContent = 'Введите заказ'; errEl.classList.add('show'); return; }
    var items = parseInput(input);
    if (!items.length) { errEl.textContent = 'Неверный формат'; errEl.classList.add('show'); return; }

    // Собираем все детали
    var allParts = [];
    for (var i = 0; i < items.length; i++) {
        for (var j = 0; j < items[i].q; j++) {
            allParts.push(items[i].w);
            allParts.push(items[i].w);
            allParts.push(items[i].h);
            allParts.push(items[i].h);
        }
    }

    // Сортируем от больших к меньшим
    allParts.sort(function(a, b) { return b - a; });

    // Жадный раскрой
    var reiki = 0;
    var remaining = allParts.slice();

    while (remaining.length > 0) {
        reiki++;
        var space = REIKA;
        var newRem = [];
        for (var i = 0; i < remaining.length; i++) {
            if (remaining[i] <= space) {
                space -= remaining[i];
            } else {
                newRem.push(remaining[i]);
            }
        }
        remaining = newRem;
    }

    var totalCuts = Math.ceil(reiki / LOAD);

    // Вывод
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var w = items[i].w, h = items[i].h, q = items[i].q;
        var perW = Math.floor(REIKA / w);
        var perH = Math.floor(REIKA / h);
        var needW = q * 2, needH = q * 2;

        html += '<div class="size-card">' +
            '<div class="card-header">📏 ' + w + '×' + h + ' — ' + q + ' шт.</div>' +
            '<div class="info-line">С рейки: <span class="green">' + perW + '×' + w + 'см</span> | <span class="green">' + perH + '×' + h + 'см</span></div>' +
            '<div class="info-line">Нужно: ' + w + '×' + needW + ' | ' + h + '×' + needH + '</div>' +
            '<div class="cuts-row" style="border-top:1px solid #555;padding-top:4px;margin-top:4px;"><span style="color:#8af;">♻ Остатки идут в дело</span></div>' +
            '</div>';
    }

    html += '<div class="summary">' +
        '<div class="summary-row"><span>🔪 Всего прорезов (все детали вместе):</span><span class="val">' + totalCuts + ' шт.</span></div>' +
        '<div class="summary-row" style="font-size:11px;color:#888;margin-top:4px;"><span>Остатки реек использованы для других размеров в этом же заказе</span></div>' +
        '</div>';

    resEl.innerHTML = html;
    resEl.classList.add('show');
}

function clearInput() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').classList.remove('show');
    document.getElementById('error').classList.remove('show');
}
</script>
</body>
</html>
