<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FrameCut Optimizer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#0f1115;
color:white;
padding:18px;
padding-bottom:120px;
}

h1{
font-size:34px;
margin-bottom:8px;
font-weight:700;
}

.subtitle{
opacity:.6;
margin-bottom:22px;
}

.card{
background:#1a1d24;
padding:18px;
border-radius:24px;
margin-bottom:18px;
box-shadow:0 0 20px rgba(0,0,0,.25);
}

textarea{
width:100%;
height:220px;
border:none;
resize:none;
border-radius:18px;
padding:16px;
background:#2a2f39;
color:white;
font-size:17px;
line-height:1.5;
outline:none;
}

button{
border:none;
border-radius:18px;
padding:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.98);
}

.primary{
background:#4f7cff;
color:white;
width:100%;
margin-top:14px;
}

.secondary{
background:#2b3039;
color:white;
flex:1;
}

.danger{
background:#ff4d67;
color:white;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;
background:#14181f;
padding:14px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.result{
background:#11151c;
border-radius:18px;
padding:18px;
margin-top:16px;
white-space:pre-line;
line-height:1.8;
font-size:17px;
}

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.stat{
background:#262b35;
padding:14px;
border-radius:16px;
text-align:center;
}

.stat b{
display:block;
font-size:28px;
margin-top:6px;
}

.green{
color:#6dff8b;
}

.orange{
color:#ffd36d;
}

.small{
opacity:.5;
font-size:14px;
margin-top:10px;
line-height:1.5;
}

</style>
</head>

<body>

<h1>FrameCut</h1>

<div class="subtitle">
Оптимизатор раскроя подрамников
</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Вставь заказ
</h3>

<textarea id="input"
placeholder="Пример:

40х50 - 350
30х40 - 350
50х70 - 400
60х80 - 80"></textarea>

<div class="small">
Формат:
ширина × высота - количество
</div>

<button class="primary" onclick="calculate()">
Рассчитать
</button>

</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Результат
</h3>

<div class="stat-grid">

<div class="stat">
Загрузок
<b id="loads">0</b>
</div>

<div class="stat">
Размеров
<b id="sizes">0</b>
</div>

</div>

<div id="result" class="result">
Нет расчёта
</div>

</div>

<div class="bottom">

<button class="secondary"
onclick="shareResult()">
Поделиться
</button>

<button class="danger"
onclick="clearAll()">
Очистить
</button>

</div>

<script>

const STOCK = 270;
const PACK = 26;

function parse(text){

const lines = text.split("\n");

let items = [];

lines.forEach(line=>{

const match =
line.match(/(\d+)\s*[xх×]\s*(\d+)\s*[-–—]\s*(\d+)/i);

if(match){

items.push({
w:Number(match[1]),
h:Number(match[2]),
count:Number(match[3])
});

}

});

return items;

}

function calculate(){

const text =
document.getElementById("input").value;

const items = parse(text);

document.getElementById("sizes").innerText =
items.length;

let result = "";

let totalLoads = 0;

let pool30 = 0;

items.forEach(item=>{

let calc =
optimize(item.w,item.h,item.count,pool30);

pool30 += calc.generated30;
pool30 -= calc.used30;

if(pool30 < 0) pool30 = 0;

totalLoads += calc.loads;

result +=
`${item.w}×${item.h} — ${item.count} шт\n\n`;

calc.lines.forEach(line=>{
result += line + "\n";
});

if(calc.generated30 > 0){

result +=
`\n<span class="green">
+${calc.generated30} заготовок 30см
</span>\n`;

}

if(calc.used30 > 0){

result +=
`<span class="orange">
-${calc.used30} заготовок 30см использовано
</span>\n`;

}

result += `\n──────────────\n\n`;

});

document.getElementById("loads").innerText =
totalLoads;

document.getElementById("result").innerHTML =
result;

localStorage.setItem(
"framecut_data",
text
);

}

function optimize(w,h,count,pool30){

const sidesW = count * 2;
const sidesH = count * 2;

let variants = [];

for(let a=1;a<=10;a++){

for(let b=1;b<=10;b++){

const used =
(a*w)+(b*h);

if(used > STOCK) continue;

const remain =
STOCK-used;

const loadsW =
Math.ceil(sidesW/(a*PACK));

const loadsH =
Math.ceil(sidesH/(b*PACK));

const loads =
Math.max(loadsW,loadsH);

let score = loads;

if(remain >=10 && remain <30){
score += 1000;
}

if(remain === 30){
score -= 3;
}

variants.push({
a,
b,
remain,
loads,
score
});

}

}

variants.sort((x,y)=>x.score-y.score);

const best = variants[0];

let generated30 = 0;

if(best.remain === 30){

generated30 =
best.loads * PACK;

}

let used30 = 0;

if(w === 30){

const need30 = sidesW;

used30 =
Math.min(pool30,need30);

}

let lines = [];

lines.push(
`${best.loads} загрузок`
);

lines.push(
`${best.a} × ${w}`
);

lines.push(
`${best.b} × ${h}`
);

lines.push(
`остаток ${best.remain}см`
);

return {
loads:best.loads,
lines,
generated30,
used30
};

}

function shareResult(){

const text =
document.getElementById("result").innerText;

navigator.share?.({
title:"FrameCut",
text
}).catch(()=>{

navigator.clipboard.writeText(text);

alert("Результат скопирован");

});

}

function clearAll(){

document.getElementById("input").value = "";

document.getElementById("result").innerHTML =
"Нет расчёта";

document.getElementById("loads").innerText = "0";
document.getElementById("sizes").innerText = "0";

localStorage.removeItem("framecut_data");

}

window.onload = ()=>{

const saved =
localStorage.getItem("framecut_data");

if(saved){

document.getElementById("input").value =
saved;

}

}

</script>

</body>
</html>
