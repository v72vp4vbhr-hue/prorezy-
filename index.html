<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Расчёт прорезов</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233a3a3a'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%235a8'%3E✂%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Прорезы">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; width:100%; overflow:hidden; background:#2c2c2c; font-family:'Segoe UI',Tahoma,sans-serif; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        .scroll-container { height:100%; width:100%; overflow-y:scroll; -webkit-overflow-scrolling:touch; padding:16px; display:flex; justify-content:center; align-items:flex-start; }
        .app { background:#3a3a3a; border-radius:12px; padding:20px; width:100%; max-width:650px; box-shadow:0 8px 32px rgba(0,0,0,0.4); margin-bottom:40px; }
        h1 { color:#e0e0e0; text-align:center; margin-bottom:14px; font-size:20px; }
        .settings { background:#333; border-radius:8px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .settings label { color:#aaa; font-size:13px; }
        .settings input { width:70px; padding:6px 8px; background:#4a4a4a; border:1px solid #555; border-radius:6px; color:#fff; font-size:14px; text-align:center; outline:none; }
        .settings .fixed { color:#888; font-size:13px; }
        label { display:block; color:#b0b0b0; margin-bottom:6px; font-size:14px; }
        textarea { width:100%; height:140px; background:#4a4a4a; border:1px solid #555; border-radius:8px; color:#fff; font-size:14px; padding:12px; outline:none; resize:vertical; font-family:'SF Mono',monospace; line-height:1.6; }
        .hint { color:#888; font-size:11px; margin-top:4px; }
        .btn-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
        .btn { flex:1; min-width:80px; padding:12px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
        .btn-calculate { background:#5a8; color:#fff; }
        .btn-clear { background:#555; color:#ccc; }
        .btn-share { background:#48a; color:#fff; flex:0.5; min-width:60px; font-size:18px; }
        .results { margin-top:16px; display:none; }
        .results.show { display:block; }
        .size-card { background:#333; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
        .card-header { color:#fff; font-size:15px; font-weight:600; margin-bottom:4px; }
        .info-line { font-size:12px; color:#aaa; margin-bottom:6px; line-height:1.5; }
        .green { color:#5c5; }
        .highlight { color:#fa0; }
        .blue { color:#8af; }
        .cuts-row { display:flex; justify-content:space-between; padding:2px 0; font-size:13px; color:#ccc; }
        .cuts-row .val { color:#5c5; font-weight:600; font-size:15px; }
        .summary { background:#444; border-radius:8px; padding:14px 16px; margin-top:12px; }
        .summary-row { display:flex; justify-content:space-between; padding:3px 0; color:#ddd; font-size:14px; }
        .summary-row .val { color:#fff; font-weight:700; font-size:16px; }
        .error { color:#e88; text-align:center; margin-top:12px; display:none; font-size:13px; }
        .error.show { display:block; }
        @supports(padding:env(safe-area-inset-top)) { .scroll-container { padding-top:calc(16px + env(safe-area-inset-top)); padding-bottom:calc(16px + env(safe-area-inset-bottom)); } }
    </style>
</head>
<body>
<div class="scroll-container">
<div class="app">
<h1>📐 Расчёт прорезов</h1>
<div class="settings">
<label>Длина рейки:</label>
<input type="number" id="reikaLength" value="270" min="10" max="1000"> см
<span class="fixed">🔒 Загрузка: 26 шт.</span>
</div>
<label>Введите заказ:</label>
<textarea id="inputData" placeholder="30x50 — 100
20x30 — 350"></textarea>
<div class="hint">Формат: <b>Ширина x Высота — Количество подрамников</b></div>
<div class="btn-row">
<button class="btn btn-calculate" onclick="calculate()">Рассчитать</button>
<button class="btn btn-clear" onclick="clearInput()">Очистить</button>
<button class="btn btn-share" onclick="shareResult()">📤</button>
</div>
<div class="error" id="error"></div>
<div class="results" id="results"></div>
</div>
</div>
<script>
var LOAD = 26;

function getReikaLength() {
    var val = parseInt(document.getElementById('reikaLength').value);
    return val > 0 ? val : 270;
}

function parseInput(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var items = [];
    for (var i = 0; i < lines.length; i++) {
        var m = lines[i].match(/(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i);
        if (m) {
            var w = parseInt(m[1]), h = parseInt(m[2]), q = parseInt(m[3]);
            if (w > 0 && h > 0 && q > 0) items.push({w: w, h: h, q: q});
        }
    }
    return items;
}

function calculate() {
    var input = document.getElementById('inputData').value.trim();
    var errEl = document.getElementById('error');
    var resEl = document.getElementById('results');
    errEl.classList.remove('show');
    resEl.classList.remove('show');
    if (!input) { errEl.textContent = 'Введите размеры'; errEl.classList.add('show'); return; }
    var items = parseInput(input);
    if (!items.length) { errEl.textContent = 'Неверный формат'; errEl.classList.add('show'); return; }

    var R = getReikaLength();
    
    // Общие потребности по размерам
    var need = {};
    for (var i = 0; i < items.length; i++) {
        need[items[i].w] = (need[items[i].w] || 0) + items[i].q * 2;
        need[items[i].h] = (need[items[i].h] || 0) + items[i].h === items[i].w ? 0 : items[i].q * 2;
        // Исправляю: для h тоже добавляем
    }
    // Пересоберём need правильно
    need = {};
    for (var i = 0; i < items.length; i++) {
        need[items[i].w] = (need[items[i].w] || 0) + items[i].q * 2;
        need[items[i].h] = (need[items[i].h] || 0) + items[i].q * 2;
    }

    var sizes = Object.keys(need).map(Number).sort(function(a,b) { return b - a; });
    
    var leftovers = {}; // { длина: количество кусков }
    var cuts = {}; // { размер: прорезов }

    for (var s = 0; s < sizes.length; s++) {
        var size = sizes[s];
        var needed = need[size] || 0;

        // Сначала берём из остатков
        var fromLeftovers = 0;
        var leftKeys = Object.keys(leftovers).map(Number).sort(function(a,b) { return b - a; });
        for (var k = 0; k < leftKeys.length && needed > 0; k++) {
            var lk = leftKeys[k];
            if (lk >= size && leftovers[lk] > 0) {
                var take = Math.min(leftovers[lk], needed);
                needed -= take;
                leftovers[lk] -= take;
                fromLeftovers += take;
                if (leftovers[lk] <= 0) delete leftovers[lk];
            }
        }

        if (needed <= 0) {
            cuts[size] = 0;
            continue;
        }

        var perReika = Math.floor(R / size);
        if (perReika === 0) { cuts[size] = 0; continue; }

        var reiki = Math.ceil(needed / perReika);
        cuts[size] = Math.ceil(reiki / LOAD);

        // Остаток с каждой рейки
        var rest = R - perReika * size;
        if (rest > 0) {
            leftovers[rest] = (leftovers[rest] || 0) + reiki;
        }
    }

    // Вывод
    var html = '';
    var totalAll = 0;
    for (var i = 0; i < items.length; i++) {
        var w = items[i].w, h = items[i].h, q = items[i].q;
        var cw = cuts[w] || 0, ch = cuts[h] || 0;
        var sum = cw + ch;
        totalAll += sum;
        html += '<div class="size-card"><div class="card-header">📏 ' + w + '×' + h + ' — ' + q + ' шт.</div>';
        html += '<div class="info-line">С рейки: <span class="green">' + Math.floor(R/w) + '×' + w + '</span> | <span class="green">' + Math.floor(R/h) + '×' + h + '</span></div>';
        html += '<div class="cuts-row"><span>🔪 Прорезов в ' + w + '</span><span class="val">' + cw + ' шт.</span></div>';
        html += '<div class="cuts-row"><span>🔪 Прорезов в ' + h + '</span><span class="val">' + ch + ' шт.</span></div>';
        html += '<div class="cuts-row" style="border-top:1px solid #555;padding-top:4px;margin-top:4px;"><span style="color:#fff;">Итого</span><span class="val">' + sum + ' шт.</span></div></div>';
    }
    html += '<div class="summary"><div class="summary-row"><span>🔪 Всего прорезов:</span><span class="val">' + totalAll + ' шт.</span></div></div>';
    resEl.innerHTML = html;
    resEl.classList.add('show');
    lastResultText = 'Всего прорезов: ' + totalAll;
}

var lastResultText = '';
function shareResult() {
    if (!lastResultText) { alert('Сначала нажмите Рассчитать'); return; }
    if (navigator.share) navigator.share({text:lastResultText});
    else alert(lastResultText);
}
function clearInput() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').classList.remove('show');
    document.getElementById('error').classList.remove('show');
}
</script>
</body>
</html>
