<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FrameCut Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#0f1115;
color:white;
padding:16px;
padding-bottom:120px;
}

h1{
font-size:30px;
margin-bottom:6px;
font-weight:700;
}

.subtitle{
opacity:.6;
margin-bottom:24px;
}

.card{
background:#1a1d24;
border-radius:22px;
padding:18px;
margin-bottom:18px;
box-shadow:0 0 15px rgba(0,0,0,.25);
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#2a2e38;
color:white;
font-size:18px;
outline:none;
}

button{
border:none;
border-radius:18px;
padding:16px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.primary{
background:#4f7cff;
color:white;
width:100%;
}

.secondary{
background:#2d323d;
color:white;
width:100%;
}

.danger{
background:#ff4d67;
color:white;
}

button:active{
transform:scale(.98);
}

.order-item{
background:#262b35;
padding:14px;
border-radius:16px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.result{
background:#11151c;
padding:16px;
border-radius:18px;
margin-top:12px;
line-height:1.6;
white-space:pre-line;
}

.good{
color:#6dff8b;
}

.bad{
color:#ff6d6d;
}

.warn{
color:#ffd36d;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;
background:#14171d;
padding:14px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.small{
font-size:14px;
opacity:.6;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.stat{
background:#262b35;
padding:14px;
border-radius:14px;
text-align:center;
}

.stat b{
display:block;
font-size:24px;
margin-top:6px;
}
</style>
</head>

<body>

<h1>FrameCut Pro</h1>
<div class="subtitle">
Расчёт раскроя подрамников
</div>

<div class="card">

<div class="row">
<input id="width" type="number" placeholder="Ширина">
<input id="height" type="number" placeholder="Высота">
</div>

<div class="row">
<input id="count" type="number" placeholder="Количество">
</div>

<button class="primary" onclick="addOrder()">
Добавить размер
</button>

<div id="orders"></div>

</div>

<div class="card">

<h2 style="margin-bottom:14px;">Результат</h2>

<div class="stats">
<div class="stat">
Реек
<b id="boardsCount">0</b>
</div>

<div class="stat">
Остатки
<b id="wasteCount">0</b>
</div>
</div>

<div id="result" class="result">
Нет расчёта
</div>

<div class="small">
Рейка: 2700 мм<br>
Пачка пилы: 26 реек
</div>

</div>

<div class="bottom">
<button class="secondary" onclick="calculate()">
Рассчитать
</button>

<button class="secondary" onclick="shareResult()">
Поделиться
</button>

<button class="danger" onclick="clearAll()">
Очистить
</button>
</div>

<script>

const STOCK = 2700;
const PACK = 26;

let orders = [];

function addOrder(){

const w = Number(document.getElementById("width").value);
const h = Number(document.getElementById("height").value);
const c = Number(document.getElementById("count").value);

if(!w || !h || !c) return;

orders.push({
w,
h,
c
});

renderOrders();

document.getElementById("width").value="";
document.getElementById("height").value="";
document.getElementById("count").value="";

saveData();
}

function renderOrders(){

const box = document.getElementById("orders");

box.innerHTML = "";

orders.forEach((o,index)=>{

box.innerHTML += `
<div class="order-item">
<div>
<b>${o.w} × ${o.h}</b><br>
${o.c} шт
</div>

<button class="danger"
onclick="removeOrder(${index})">
✕
</button>
</div>
`;

});

}

function removeOrder(index){
orders.splice(index,1);
renderOrders();
saveData();
}

function calculate(){

let allCuts = [];

orders.forEach(order=>{

for(let i=0;i<order.c;i++){

allCuts.push(order.w * 10);
allCuts.push(order.h * 10);

}

});

allCuts.sort((a,b)=>b-a);

let boards = [];
let leftovers30 = [];

allCuts.forEach(cut=>{

let placed = false;

for(let board of boards){

if(board.remaining >= cut){

board.cuts.push(cut);
board.remaining -= cut;

placed = true;
break;
}

}

if(!placed){

boards.push({
cuts:[cut],
remaining:STOCK - cut
});

}

});

let output = "";

let waste = 0;

boards.forEach((b,index)=>{

const cutsMap = {};

b.cuts.forEach(c=>{
cutsMap[c] = (cutsMap[c]||0)+1;
});

output += `Рейка #${index+1}\n`;

Object.keys(cutsMap).forEach(k=>{

output += `${cutsMap[k]} × ${k/10}см\n`;

});

if(b.remaining < 100){

output += `Остаток: ${b.remaining/10}см → МУСОР\n\n`;
waste++;

}else if(b.remaining >=100 && b.remaining <300){

output += `Остаток: ${b.remaining/10}см → ПЛОХОЙ ОСТАТОК\n\n`;

}else{

output += `Остаток: ${b.remaining/10}см → ПОЛЕЗНЫЙ\n\n`;

leftovers30.push(b.remaining);

}

});

document.getElementById("result").innerHTML = output;

document.getElementById("boardsCount").innerText =
boards.length;

document.getElementById("wasteCount").innerText =
waste;

saveData();

}

function clearAll(){

orders = [];

renderOrders();

document.getElementById("result").innerHTML =
"Нет расчёта";

document.getElementById("boardsCount").innerText = "0";
document.getElementById("wasteCount").innerText = "0";

localStorage.removeItem("framecut");

}

function shareResult(){

const text =
document.getElementById("result").innerText;

navigator.share?.({
title:"FrameCut",
text
}).catch(()=>{

navigator.clipboard.writeText(text);

alert("Результат скопирован");

});

}

function saveData(){

localStorage.setItem(
"framecut",
JSON.stringify(orders)
);

}

function loadData(){

const data = localStorage.getItem("framecut");

if(data){

orders = JSON.parse(data);

renderOrders();

}

}

loadData();

</script>

</body>
</html>
