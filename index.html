<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCut Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#0f1115;
color:white;
padding:18px;
padding-bottom:120px;
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
opacity:.6;
margin-bottom:24px;
font-size:15px;
}

.card{
background:#1a1d24;
padding:18px;
border-radius:24px;
margin-bottom:18px;
box-shadow:0 0 20px rgba(0,0,0,.25);
}

textarea{
width:100%;
height:240px;
background:#2b3039;
border:none;
border-radius:18px;
padding:16px;
font-size:17px;
color:white;
resize:none;
outline:none;
line-height:1.5;
}

button{
border:none;
border-radius:18px;
padding:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.98);
}

.primary{
background:#4f7cff;
color:white;
width:100%;
margin-top:14px;
}

.secondary{
background:#2b3039;
color:white;
flex:1;
}

.danger{
background:#ff4d67;
color:white;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#14181f;
padding:14px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.result{
background:#11151c;
border-radius:18px;
padding:18px;
margin-top:16px;
line-height:1.8;
white-space:pre-line;
font-size:17px;
}

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.stat{
background:#262b35;
padding:14px;
border-radius:16px;
text-align:center;
}

.stat b{
display:block;
font-size:28px;
margin-top:6px;
}

.green{
color:#6dff8b;
}

.orange{
color:#ffd36d;
}

.red{
color:#ff6d6d;
}

.small{
font-size:14px;
opacity:.5;
margin-top:10px;
line-height:1.5;
}

</style>
</head>

<body>

<h1>FrameCut Pro</h1>

<div class="subtitle">
Оптимизатор раскроя подрамников
</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Вставь заказ
</h3>

<textarea id="input"
placeholder="Пример:

60х80 - 80
50х70 - 400
40х60 - 500
30х40 - 350
20х30 - 350"></textarea>

<div class="small">
Формат:
ширина × высота - количество
</div>

<button class="primary" onclick="calculate()">
Рассчитать
</button>

</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Результат
</h3>

<div class="stat-grid">

<div class="stat">
Загрузок
<b id="loads">0</b>
</div>

<div class="stat">
Размеров
<b id="sizes">0</b>
</div>

</div>

<div id="result" class="result">
Нет расчёта
</div>

</div>

<div class="bottom">

<button class="secondary"
onclick="shareResult()">
Поделиться
</button>

<button class="danger"
onclick="clearAll()">
Очистить
</button>

</div>

<script>

const STOCK = 270;
const PACK = 26;

function parse(text){

const lines = text.split("\n");

let items = [];

lines.forEach(line=>{

const match =
line.match(/(\d+)\s*[xх×]\s*(\d+)\s*[-–—]\s*(\d+)/i);

if(match){

items.push({
w:Number(match[1]),
h:Number(match[2]),
count:Number(match[3])
});

}

});

return items;

}

function calculate(){

const text =
document.getElementById("input").value;

let items = parse(text);

items.sort((a,b)=>{

const maxA = Math.max(a.w,a.h);
const maxB = Math.max(b.w,b.h);

return maxB - maxA;

});

document.getElementById("sizes").innerText =
items.length;

let result = "";

let totalLoads = 0;

let pool20 = 0;
let pool30 = 0;

items.forEach(item=>{

let calc =
optimize(
item.w,
item.h,
item.count,
pool20,
pool30
);

pool20 += calc.new20;
pool30 += calc.new30;

pool20 -= calc.used20;
pool30 -= calc.used30;

if(pool20 < 0) pool20 = 0;
if(pool30 < 0) pool30 = 0;

totalLoads += calc.loads;

result +=
`${item.w}×${item.h} — ${item.count} шт\n\n`;

calc.lines.forEach(line=>{
result += line + "\n";
});

if(calc.new30){

result +=
`\n<span class="green">
+${calc.new30} заготовок 30см
</span>\n`;

}

if(calc.used30){

result +=
`<span class="orange">
использовано ${calc.used30} заготовок 30см
</span>\n`;

}

if(calc.new20){

result +=
`<span class="green">
+${calc.new20} заготовок 20см
</span>\n`;

}

if(calc.used20){

result +=
`<span class="orange">
использовано ${calc.used20} заготовок 20см
</span>\n`;

}

result += `\n──────────────\n\n`;

});

result +=
`\nВсего остатков 30см: ${pool30}\n`;

result +=
`Всего остатков 20см: ${pool20}\n`;

document.getElementById("loads").innerText =
totalLoads;

document.getElementById("result").innerHTML =
result;

localStorage.setItem(
"framecut_data",
text
);

}

function optimize(w,h,count,pool20,pool30){

const sidesW = count * 2;
const sidesH = count * 2;

let best = null;

for(let a=0;a<=10;a++){

for(let b=0;b<=10;b++){

if(a===0 && b===0) continue;

const used =
(a*w)+(b*h);

if(used > STOCK) continue;

const remain =
STOCK-used;

if(
remain !==0 &&
remain !==20 &&
remain !==30
){
continue;
}

const prodW = a * PACK;
const prodH = b * PACK;

if(prodW===0 || prodH===0) continue;

const loadsW =
Math.ceil(sidesW / prodW);

const loadsH =
Math.ceil(sidesH / prodH);

const loads =
Math.max(loadsW,loadsH);

let score = loads;

if(remain===30) score -= 5;
if(remain===20) score -= 3;

if(
(a===2 && b===2) ||
(a===3 && b===3) ||
(a===4 && b===4)
){
score -= 2;
}

if(
(a>=6 || b>=6)
){
score -= 1;
}

if(!best || score < best.score){

best = {
a,
b,
remain,
loads,
score
};

}

}

}

let new20 = 0;
let new30 = 0;

if(best.remain===20){

new20 = best.loads * PACK;

}

if(best.remain===30){

new30 = best.loads * PACK;

}

let used20 = 0;
let used30 = 0;

if(w===20){

used20 =
Math.min(pool20,sidesW);

}

if(w===30){

used30 =
Math.min(pool30,sidesW);

}

let realSidesW =
sidesW - used20 - used30;

if(realSidesW < 0){
realSidesW = 0;
}

let lines = [];

lines.push(
`${best.loads} загрузок`
);

if(best.a){

lines.push(
`${best.a} × ${w}`
);

}

if(best.b){

lines.push(
`${best.b} × ${h}`
);

}

lines.push(
`остаток ${best.remain}см`
);

return {
loads:best.loads,
lines,
new20,
new30,
used20,
used30
};

}

function shareResult(){

const text =
document.getElementById("result").innerText;

navigator.share?.({
title:"FrameCut Pro",
text
}).catch(()=>{

navigator.clipboard.writeText(text);

alert("Результат скопирован");

});

}

function clearAll(){

document.getElementById("input").value = "";

document.getElementById("result").innerHTML =
"Нет расчёта";

document.getElementById("loads").innerText = "0";
document.getElementById("sizes").innerText = "0";

localStorage.removeItem("framecut_data");

}

window.onload = ()=>{

const saved =
localStorage.getItem("framecut_data");

if(saved){

document.getElementById("input").value =
saved;

}

}

</script>

</body>
</html>
