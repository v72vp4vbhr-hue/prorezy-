<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Расчёт прорезов</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233a3a3a'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%235a8'%3E✂%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Прорезы">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; width:100%; overflow:hidden; background:#2c2c2c; font-family:'Segoe UI',Tahoma,sans-serif; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
        .scroll-container { height:100%; width:100%; overflow-y:scroll; -webkit-overflow-scrolling:touch; padding:16px; display:flex; justify-content:center; align-items:flex-start; }
        .app { background:#3a3a3a; border-radius:12px; padding:20px; width:100%; max-width:650px; box-shadow:0 8px 32px rgba(0,0,0,0.4); margin-bottom:40px; }
        h1 { color:#e0e0e0; text-align:center; margin-bottom:14px; font-size:20px; font-weight:500; }
        .settings { background:#333; border-radius:8px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .settings label { color:#aaa; font-size:13px; }
        .settings input { width:70px; padding:6px 8px; background:#4a4a4a; border:1px solid #555; border-radius:6px; color:#fff; font-size:14px; text-align:center; outline:none; }
        .settings .fixed { color:#888; font-size:13px; }
        label { display:block; color:#b0b0b0; margin-bottom:6px; font-size:14px; }
        textarea { width:100%; height:140px; background:#4a4a4a; border:1px solid #555; border-radius:8px; color:#fff; font-size:14px; padding:12px; outline:none; resize:vertical; font-family:'SF Mono',monospace; line-height:1.6; }
        .hint { color:#888; font-size:11px; margin-top:4px; }
        .btn-row { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
        .btn { flex:1; min-width:80px; padding:12px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; }
        .btn-calculate { background:#5a8; color:#fff; }
        .btn-clear { background:#555; color:#ccc; }
        .btn-share { background:#48a; color:#fff; flex:0.5; min-width:60px; font-size:18px; }
        .results { margin-top:16px; display:none; }
        .results.show { display:block; }
        .size-card { background:#333; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
        .card-header { color:#fff; font-size:15px; font-weight:600; margin-bottom:4px; }
        .info-line { font-size:12px; color:#aaa; margin-bottom:6px; line-height:1.5; }
        .green { color:#5c5; }
        .highlight { color:#fa0; }
        .blue { color:#8af; }
        .cuts-row { display:flex; justify-content:space-between; padding:2px 0; font-size:13px; color:#ccc; }
        .cuts-row .val { color:#5c5; font-weight:600; font-size:15px; }
        .summary { background:#444; border-radius:8px; padding:14px 16px; margin-top:12px; }
        .summary-row { display:flex; justify-content:space-between; padding:3px 0; color:#ddd; font-size:14px; }
        .summary-row .val { color:#fff; font-weight:700; font-size:16px; }
        .error { color:#e88; text-align:center; margin-top:12px; display:none; font-size:13px; }
        .error.show { display:block; }
        @supports(padding:env(safe-area-inset-top)) { .scroll-container { padding-top:calc(16px + env(safe-area-inset-top)); padding-bottom:calc(16px + env(safe-area-inset-bottom)); } }
    </style>
</head>
<body>
<div class="scroll-container">
<div class="app">
<h1>📐 Расчёт прорезов</h1>
<div class="settings">
<label>Длина рейки:</label>
<input type="number" id="reikaLength" value="270" min="10" max="1000"> см
<span class="fixed">🔒 Загрузка: 26 шт.</span>
</div>
<label>Введите заказ:</label>
<textarea id="inputData" placeholder="30x50 — 100
20x30 — 350"></textarea>
<div class="hint">Формат: <b>Ширина x Высота — Количество подрамников</b></div>
<div class="btn-row">
<button class="btn btn-calculate" onclick="calculate()">Рассчитать</button>
<button class="btn btn-clear" onclick="clearInput()">Очистить</button>
<button class="btn btn-share" onclick="shareResult()">📤</button>
</div>
<div class="error" id="error"></div>
<div class="results" id="results"></div>
</div>
</div>
<script>
var LOAD = 26;
var lastResultText = '';

function getReikaLength() {
    var val = parseInt(document.getElementById('reikaLength').value);
    return (val > 0) ? val : 270;
}

function parseInput(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim() !== ''; });
    var items = [];
    for (var i = 0; i < lines.length; i++) {
        var m = lines[i].match(/(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i);
        if (m) {
            var w = parseInt(m[1]), h = parseInt(m[2]), q = parseInt(m[3]);
            if (w > 0 && h > 0 && q > 0) items.push({width: w, height: h, quantity: q});
        }
    }
    return items;
}

function calculate() {
    var input = document.getElementById('inputData').value.trim();
    var errDiv = document.getElementById('error');
    var resDiv = document.getElementById('results');
    errDiv.classList.remove('show');
    resDiv.classList.remove('show');
    if (!input) { errDiv.textContent = 'Введите размеры'; errDiv.classList.add('show'); return; }
    var items = parseInput(input);
    if (!items.length) { errDiv.textContent = 'Неверный формат'; errDiv.classList.add('show'); return; }

    var reikaLen = getReikaLength();

    // Собираем все потребности по размерам
    var need = {}; // { размер: сколько деталей нужно всего }
    for (var i = 0; i < items.length; i++) {
        var w = items[i].width;
        var h = items[i].height;
        var q = items[i].quantity;
        need[w] = (need[w] || 0) + q * 2;
        need[h] = (need[h] || 0) + q * 2;
    }

    // Сортируем размеры по убыванию — большие режем первыми
    var sizes = Object.keys(need).map(Number).sort(function(a,b) { return b - a; });

    var restPieces = {}; // остатки-куски реек: { длина: количество }

    // Первый проход: режем каждый размер, собираем остатки
    var reikiBySize = {}; // { размер: сколько реек }
    var cutsBySize = {};  // { размер: сколько прорезов }

    for (var i = 0; i < sizes.length; i++) {
        var size = sizes[i];
        var needed = need[size] || 0;
        if (needed === 0) continue;

        var perReika = Math.floor(reikaLen / size);
        if (perReika === 0) { cutsBySize[size] = 0; reikiBySize[size] = 0; continue; }

        var reiki = Math.ceil(needed / perReika);
        reikiBySize[size] = reiki;
        cutsBySize[size] = Math.ceil(reiki / LOAD);

        // Остаток с каждой рейки
        var rest = reikaLen - perReika * size;
        if (rest > 0) {
            restPieces[rest] = (restPieces[rest] || 0) + reiki;
        }
    }

    // Второй проход: используем остатки для уменьшения потребностей
    var bonus = {}; // { размер: сколько деталей получили из остатков }
    var restSizes = Object.keys(restPieces).map(Number).sort(function(a,b) { return b - a; });

    for (var i = 0; i < restSizes.length; i++) {
        var restLen = restSizes[i];
        var restCount = restPieces[restLen];
        if (restCount <= 0) continue;

        // Из остатка restLen можно нарезать детали меньших размеров
        for (var j = 0; j < sizes.length && restCount > 0; j++) {
            var smallSize = sizes[j];
            if (smallSize > restLen) continue;
            var canFit = Math.floor(restLen / smallSize);
            if (canFit === 0) continue;
            bonus[smallSize] = (bonus[smallSize] || 0) + canFit * restCount;
            restCount = 0;
        }
    }

    // Вычитаем бонусы из потребностей и пересчитываем прорезы
    for (var i = 0; i < sizes.length; i++) {
        var size = sizes[i];
        var newNeed = Math.max(0, (need[size] || 0) - (bonus[size] || 0));
        if (newNeed === 0) {
            cutsBySize[size] = 0;
            reikiBySize[size] = 0;
            continue;
        }
        var perReika = Math.floor(reikaLen / size);
        if (perReika === 0) { cutsBySize[size] = 0; continue; }
        var reiki = Math.ceil(newNeed / perReika);
        reikiBySize[size] = reiki;
        cutsBySize[size] = Math.ceil(reiki / LOAD);
    }

    // Вывод
    var html = '';
    var textResult = '📐 Расчёт прорезов (с остатками)\nДлина рейки: ' + reikaLen + ' см\n\n';
    var totalAllCuts = 0;

    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var cutsW = cutsBySize[item.width] || 0;
        var cutsH = cutsBySize[item.height] || 0;
        var total = cutsW + cutsH;
        totalAllCuts += total;

        var needW = item.quantity * 2;
        var needH = item.quantity * 2;
        var perW = Math.floor(reikaLen / item.width);
        var perH = Math.floor(reikaLen / item.height);
        var bonusW = bonus[item.width] || 0;
        var bonusH = bonus[item.height] || 0;
        // Пропорционально распределяем бонусы
        var ratioW = needW / (needW + needH);
        var myBonusW = Math.round(bonusW * ratioW);
        var myBonusH = Math.round(bonusH * (1 - ratioW));

        html += '<div class="size-card">' +
            '<div class="card-header">📏 ' + item.width + '×' + item.height + ' — ' + item.quantity + ' шт.</div>' +
            '<div class="info-line">' +
            'С 1 рейки: <span class="green">' + perW + ' шт. по ' + item.width + ' см</span> | <span class="green">' + perH + ' шт. по ' + item.height + ' см</span><br>';
        if (bonusW > 0 || bonusH > 0) {
            html += '<span class="blue">♻ Из остатков: ' + item.width + 'см × ' + (bonusW || 0) + ', ' + item.height + 'см × ' + (bonusH || 0) + '</span><br>';
        }
        html += 'Нужно: ' + item.width + '×' + needW + ' | ' + item.height + '×' + needH + '</div>' +
            '<div class="cuts-row"><span>🔪 Прорезов в ' + item.width + '</span><span class="val">' + cutsW + ' шт.</span></div>' +
            '<div class="cuts-row"><span>🔪 Прорезов в ' + item.height + '</span><span class="val">' + cutsH + ' шт.</span></div>' +
            '<div class="cuts-row" style="border-top:1px solid #555; padding-top:4px; margin-top:4px;">' +
            '<span style="color:#fff;">Итого</span><span class="val">' + total + ' шт.</span></div></div>';

        textResult += item.width + '×' + item.height + ' — ' + item.quantity + ' шт.\n';
        textResult += '  Прорезов: ' + cutsW + ' + ' + cutsH + ' = ' + total + '\n\n';
    }

    html += '<div class="summary"><div class="summary-row"><span>🔪 Всего прорезов:</span><span class="val">' + totalAllCuts + ' шт.</span></div></div>';
    textResult += '🔪 Всего прорезов: ' + totalAllCuts + ' шт.';

    resDiv.innerHTML = html;
    resDiv.classList.add('show');
    lastResultText = textResult;
    setTimeout(function() { resDiv.scrollIntoView({behavior:'smooth',block:'start'}); }, 200);
}

function shareResult() {
    if (!lastResultText) { alert('Сначала нажмите «Рассчитать»'); return; }
    if (navigator.share) { navigator.share({text:lastResultText}).catch(function(){}); }
    else { navigator.clipboard.writeText(lastResultText).then(function(){alert('Скопировано!');}); }
}

function clearInput() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').classList.remove('show');
    document.getElementById('error').classList.remove('show');
    lastResultText = '';
}
</script>
</body>
</html>
