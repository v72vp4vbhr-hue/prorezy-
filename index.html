<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Расчёт прорезов</title>

    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%A0%D0%B0%D1%81%D1%87%D1%91%D1%82%20%D0%BF%D1%80%D0%BE%D1%80%D0%B5%D0%B7%D0%BE%D0%B2%22%2C%22short_name%22%3A%22%D0%9F%D1%80%D0%BE%D1%80%D0%B5%D0%B7%D1%8B%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%232c2c2c%22%2C%22theme_color%22%3A%22%233a3a3a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%253Crect%20width%3D'100'%20height%3D'100'%20rx%3D'20'%20fill%3D'%233a3a3a'%2F%3E%253Ctext%20x%3D'50'%20y%3D'68'%20font-size%3D'55'%20text-anchor%3D'middle'%20fill%3D'%235a8'%3E%25E2%259C%2582%253C%2Ftext%3E%253C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233a3a3a'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%235a8'%3E✂%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Прорезы">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%; width: 100%; overflow: hidden;
            background: #2c2c2c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }
        .scroll-container {
            height: 100%; width: 100%;
            overflow-y: scroll; -webkit-overflow-scrolling: touch;
            padding: 16px;
            display: flex; justify-content: center; align-items: flex-start;
        }
        .app {
            background: #3a3a3a; border-radius: 12px; padding: 20px;
            width: 100%; max-width: 650px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); margin-bottom: 40px;
        }
        h1 { color: #e0e0e0; text-align: center; margin-bottom: 14px; font-size: 20px; font-weight: 500; }
        .settings {
            background: #333; border-radius: 8px; padding: 10px 14px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .settings label { color: #aaa; font-size: 13px; }
        .settings input {
            width: 70px; padding: 6px 8px; background: #4a4a4a; border: 1px solid #555;
            border-radius: 6px; color: #fff; font-size: 14px; text-align: center; outline: none;
        }
        .settings .fixed { color: #888; font-size: 13px; }
        label { display: block; color: #b0b0b0; margin-bottom: 6px; font-size: 14px; }
        textarea {
            width: 100%; height: 140px; background: #4a4a4a; border: 1px solid #555;
            border-radius: 8px; color: #fff; font-size: 14px; padding: 12px; outline: none;
            resize: vertical; font-family: 'SF Mono', 'Menlo', 'Courier New', monospace; line-height: 1.6;
        }
        .hint { color: #888; font-size: 11px; margin-top: 4px; }
        .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 80px; padding: 12px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
        }
        .btn-calculate { background: #5a8; color: #fff; }
        .btn-clear { background: #555; color: #ccc; }
        .btn-share { background: #48a; color: #fff; flex: 0.5; min-width: 60px; font-size: 18px; }
        .results { margin-top: 16px; display: none; }
        .results.show { display: block; }
        .size-card {
            background: #333; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
        }
        .card-header { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .info-line { font-size: 12px; color: #aaa; margin-bottom: 6px; line-height: 1.5; }
        .green { color: #5c5; }
        .highlight { color: #fa0; }
        .cuts-row {
            display: flex; justify-content: space-between;
            padding: 2px 0; font-size: 13px; color: #ccc;
        }
        .cuts-row .val { color: #5c5; font-weight: 600; font-size: 15px; }
        .summary {
            background: #444; border-radius: 8px; padding: 14px 16px; margin-top: 12px;
        }
        .summary-row {
            display: flex; justify-content: space-between;
            padding: 3px 0; color: #ddd; font-size: 14px;
        }
        .summary-row .val { color: #fff; font-weight: 700; font-size: 16px; }
        .error { color: #e88; text-align: center; margin-top: 12px; display: none; font-size: 13px; }
        .error.show { display: block; }
        @supports (padding: env(safe-area-inset-top)) {
            .scroll-container {
                padding-top: calc(16px + env(safe-area-inset-top));
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
<div class="scroll-container">
    <div class="app">
        <h1>📐 Расчёт прорезов</h1>

        <div class="settings">
            <label>Длина рейки:</label>
            <input type="number" id="reikaLength" value="270" min="10" max="1000"> см
            <span class="fixed">🔒 Загрузка: 26 шт.</span>
        </div>

        <label>Введите заказ:</label>
        <textarea id="inputData" placeholder="30x50 — 100
20x30 — 350"></textarea>
        <div class="hint">Формат: <b>Ширина x Высота — Количество подрамников</b></div>

        <div class="btn-row">
            <button class="btn btn-calculate" onclick="calculate()">Рассчитать</button>
            <button class="btn btn-clear" onclick="clearInput()">Очистить</button>
            <button class="btn btn-share" onclick="shareResult()" title="Поделиться">📤</button>
        </div>

        <div class="error" id="error"></div>
        <div class="results" id="results"></div>
    </div>
</div>

<script>
var LOAD = 26;
var lastResultText = '';

function getReikaLength() {
    var val = parseInt(document.getElementById('reikaLength').value);
    return (val > 0) ? val : 270;
}

function parseInput(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim() !== ''; });
    var items = [];
    for (var i = 0; i < lines.length; i++) {
        var l = lines[i];
        var m = l.match(/(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i);
        if (m) {
            var w = parseInt(m[1]), h = parseInt(m[2]), q = parseInt(m[3]);
            if (w > 0 && h > 0 && q > 0) {
                items.push({width: w, height: h, quantity: q});
            }
        }
    }
    return items;
}

function calculate() {
    var input = document.getElementById('inputData').value.trim();
    var errDiv = document.getElementById('error');
    var resDiv = document.getElementById('results');

    errDiv.classList.remove('show');
    resDiv.classList.remove('show');

    if (!input) {
        errDiv.textContent = 'Введите размеры';
        errDiv.classList.add('show');
        return;
    }

    var items = parseInput(input);
    if (items.length === 0) {
        errDiv.textContent = 'Неверный формат. Пример: 40x50 — 100';
        errDiv.classList.add('show');
        return;
    }

    var reikaLen = getReikaLength();
    var html = '';
    var textResult = '📐 Расчёт прорезов\nДлина рейки: ' + reikaLen + ' см | Загрузка: ' + LOAD + ' шт.\n\n';
    var totalAllCuts = 0;

    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var needW = item.quantity * 2;
        var needH = item.quantity * 2;

        var perW = Math.floor(reikaLen / item.width);
        var perH = Math.floor(reikaLen / item.height);
        var restW = reikaLen - perW * item.width;
        var restH = reikaLen - perH * item.height;

        var reikiW = Math.ceil(needW / perW);
        var reikiH = Math.ceil(needH / perH);

        var cutsW = Math.ceil(reikiW / LOAD);
        var cutsH = Math.ceil(reikiH / LOAD);
        var totalCuts = cutsW + cutsH;
        totalAllCuts += totalCuts;

        html += '<div class="size-card">' +
            '<div class="card-header">📏 ' + item.width + '×' + item.height + ' — ' + item.quantity + ' шт.</div>' +
            '<div class="info-line">' +
            'С 1 рейки: <span class="green">' + perW + ' шт. по ' + item.width + ' см</span> (ост. <span class="highlight">' + restW + ' см</span>) | ' +
            '<span class="green">' + perH + ' шт. по ' + item.height + ' см</span> (ост. <span class="highlight">' + restH + ' см</span>)<br>' +
            'Нужно деталей: ' + item.width + 'см × ' + needW + ' | ' + item.height + 'см × ' + needH + '<br>' +
            'Рейк: ' + reikiW + ' + ' + reikiH + ' = ' + (reikiW + reikiH) +
            '</div>' +
            '<div class="cuts-row"><span>🔪 Прорезов в ' + item.width + '</span><span class="val">' + cutsW + ' шт.</span></div>' +
            '<div class="cuts-row"><span>🔪 Прорезов в ' + item.height + '</span><span class="val">' + cutsH + ' шт.</span></div>' +
            '<div class="cuts-row" style="border-top:1px solid #555; padding-top:4px; margin-top:4px;">' +
            '<span style="color:#fff;">Итого прорезов</span>' +
            '<span class="val">' + totalCuts + ' шт.</span>' +
            '</div></div>';

        textResult += item.width + '×' + item.height + ' — ' + item.quantity + ' шт.\n';
        textResult += '  С рейки: ' + perW + '×' + item.width + ' (ост.' + restW + ') + ' + perH + '×' + item.height + ' (ост.' + restH + ')\n';
        textResult += '  Рейк: ' + reikiW + ' + ' + reikiH + ', Прорезов: ' + cutsW + ' + ' + cutsH + ' = ' + totalCuts + '\n\n';
    }

    html += '<div class="summary">' +
        '<div class="summary-row">' +
        '<span>🔪 Всего прорезов на заказ:</span>' +
        '<span class="val">' + totalAllCuts + ' шт.</span>' +
        '</div></div>';

    textResult += '🔪 Всего прорезов: ' + totalAllCuts + ' шт.';

    resDiv.innerHTML = html;
    resDiv.classList.add('show');
    lastResultText = textResult;

    setTimeout(function() {
        resDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
}

function shareResult() {
    if (!lastResultText) {
        alert('Сначала нажмите «Рассчитать»');
        return;
    }
    if (navigator.share) {
        navigator.share({ text: lastResultText }).catch(function() {});
    } else {
        navigator.clipboard.writeText(lastResultText).then(function() {
            alert('Скопировано!');
        });
    }
}

function clearInput() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').classList.remove('show');
    document.getElementById('error').classList.remove('show');
    lastResultText = '';
}
</script>
</body>
</html>
