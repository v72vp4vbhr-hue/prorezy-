<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FrameCut Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#0f1115;
color:white;
padding:18px;
padding-bottom:120px;
}

h1{
font-size:32px;
font-weight:700;
margin-bottom:6px;
}

.subtitle{
opacity:.6;
margin-bottom:24px;
}

.card{
background:#1a1d24;
border-radius:24px;
padding:18px;
margin-bottom:18px;
box-shadow:0 0 20px rgba(0,0,0,.25);
}

textarea{
width:100%;
height:180px;
border:none;
resize:none;
border-radius:18px;
padding:16px;
background:#2a2f39;
color:white;
font-size:17px;
outline:none;
line-height:1.5;
}

button{
border:none;
border-radius:18px;
padding:18px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.98);
}

.primary{
width:100%;
background:#4e7bff;
color:white;
margin-top:14px;
}

.secondary{
background:#2b3039;
color:white;
flex:1;
}

.danger{
background:#ff4e68;
color:white;
}

.result{
background:#11151c;
border-radius:18px;
padding:18px;
margin-top:18px;
white-space:pre-line;
line-height:1.7;
font-size:17px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#14181f;
padding:14px;
display:flex;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.stat-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.stat{
background:#252a34;
padding:14px;
border-radius:16px;
text-align:center;
}

.stat b{
display:block;
font-size:26px;
margin-top:8px;
}

.example{
opacity:.5;
font-size:14px;
margin-top:10px;
line-height:1.5;
}

.green{
color:#6cff8e;
}

.orange{
color:#ffca68;
}

.red{
color:#ff6d6d;
}

</style>
</head>

<body>

<h1>FrameCut Pro</h1>

<div class="subtitle">
Оптимизатор раскроя подрамников
</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Вставь заказ
</h3>

<textarea id="orderInput"
placeholder="Пример:

40х50 - 1040
30х40 - 1000
60х80 - 80"></textarea>

<div class="example">
Формат:
ширина × высота - количество
</div>

<button class="primary" onclick="calculate()">
Рассчитать
</button>

</div>

<div class="card">

<h3 style="margin-bottom:14px;">
Результат
</h3>

<div class="stat-grid">

<div class="stat">
Загрузок
<b id="loads">0</b>
</div>

<div class="stat">
Размеров
<b id="sizes">0</b>
</div>

</div>

<div id="result" class="result">
Нет расчёта
</div>

</div>

<div class="bottom">

<button class="secondary"
onclick="shareResult()">
Поделиться
</button>

<button class="danger"
onclick="clearAll()">
Очистить
</button>

</div>

<script>

const STOCK = 2700;
const RAILS = 26;

function parseOrder(text){

const lines = text.split("\n");

let items = [];

lines.forEach(line=>{

line = line.replace(/,/g,".");

const match =
line.match(/(\d+)\s*[xх×]\s*(\d+)\s*[-–—]\s*(\d+)/i);

if(match){

items.push({
w:Number(match[1]),
h:Number(match[2]),
count:Number(match[3])
});

}

});

return items;

}

function calculate(){

const input =
document.getElementById("orderInput").value;

const items = parseOrder(input);

document.getElementById("sizes").innerText =
items.length;

let totalLoads = 0;

let output = "";

items.forEach(item=>{

const w = item.w;
const h = item.h;
const count = item.count;

let result = optimize(w,h,count);

totalLoads += result.loads;

output +=
`${w}×${h} — ${count} шт\n\n`;

output +=
`${result.loads} загрузок\n`;

output +=
`${result.scheme}\n`;

if(result.waste <= 9){

output +=
`<span class="green">Отход: ${result.waste}см</span>\n`;

}else if(result.waste >=10 && result.waste <30){

output +=
`<span class="orange">Плохой остаток: ${result.waste}см</span>\n`;

}else{

output +=
`<span class="green">Полезный остаток: ${result.waste}см</span>\n`;

}

output += `\n──────────────\n\n`;

});

document.getElementById("loads").innerText =
totalLoads;

document.getElementById("result").innerHTML =
output;

localStorage.setItem(
"framecut_orders",
input
);

}

function optimize(w,h,count){

let best = null;

for(let a=1;a<=10;a++){

for(let b=1;b<=10;b++){

const used =
(a*w*10)+(b*h*10);

if(used <= STOCK){

const remain =
(STOCK-used)/10;

const framesPerLoad =
Math.min(a,b)*RAILS;

if(framesPerLoad <=0) continue;

const loads =
Math.ceil(count/framesPerLoad);

const score =
(remain >=10 && remain <30)
? 9999 + remain
: remain;

if(!best || score < best.score){

best = {
loads,
scheme:
`${a} × ${w}\n${b} × ${h}`,
waste:remain,
score
};

}

}

}

}

return best;

}

function shareResult(){

const text =
document.getElementById("result").innerText;

navigator.share?.({
title:"FrameCut Pro",
text
}).catch(()=>{

navigator.clipboard.writeText(text);

alert("Результат скопирован");

});

}

function clearAll(){

document.getElementById("orderInput").value = "";
document.getElementById("result").innerHTML =
"Нет расчёта";

document.getElementById("loads").innerText = "0";
document.getElementById("sizes").innerText = "0";

localStorage.removeItem("framecut_orders");

}

window.onload = ()=>{

const saved =
localStorage.getItem("framecut_orders");

if(saved){

document.getElementById("orderInput").value =
saved;

}

}

</script>

</body>
</html>
